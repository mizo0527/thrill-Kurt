<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>スリルカート 試作3号改</title>
  <style>
    :root{
      --bg:#111;
      --road1:#4a4a4a;
      --road2:#262626;
      --ui-bg:rgba(0,0,0,.32);
      --text:#fff;
      --btn-bg:rgba(235,235,235,.84);
      --btn-active:rgba(255,255,255,.96);
      --danger:#ffd84f;
      --danger2:#1b1b1b;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      font-family:sans-serif;
      color:var(--text);
      touch-action:manipulation;
    }

    #game{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:
        linear-gradient(to bottom, #2c2c2c 0%, #171717 100%);
    }

    /* 背景 */
    #scene{
      position:absolute;
      inset:0;
      z-index:1;
      overflow:hidden;
    }

    #ceiling{
      position:absolute;
      left:16%;
      right:16%;
      top:0;
      height:18%;
      opacity:.55;
      background:
        repeating-linear-gradient(
          to right,
          rgba(255,255,255,.06) 0px,
          rgba(255,255,255,.06) 2px,
          transparent 2px,
          transparent 64px
        ),
        linear-gradient(to bottom, #b9b3a8, #8a8378);
      clip-path:polygon(10% 0, 90% 0, 100% 100%, 0 100%);
    }

    .shelf{
      position:absolute;
      top:12%;
      bottom:0;
      width:22%;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.06), rgba(0,0,0,.18)),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.04) 0px,
          rgba(255,255,255,.04) 4px,
          transparent 4px,
          transparent 76px
        ),
        linear-gradient(to right, #415171, #253247);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
      z-index:1;
    }

    #leftShelf{
      left:0;
      clip-path:polygon(0 0, 100% 0, 84% 100%, 0 100%);
      transform-origin:left center;
    }

    #rightShelf{
      right:0;
      clip-path:polygon(16% 0, 100% 0, 100% 100%, 0 100%);
      transform-origin:right center;
    }

    .shelf-products{
      position:absolute;
      inset:0;
      padding:10px 10px 76px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .row{
      display:flex;
      gap:4px;
      justify-content:center;
      align-items:flex-end;
      height:62px;
    }

    .prod{
      width:16%;
      border-radius:4px;
      box-shadow:inset 0 -2px 0 rgba(0,0,0,.2);
    }

    .p1{height:34px;background:#f4d35e;}
    .p2{height:44px;background:#ee964b;}
    .p3{height:38px;background:#f95738;}
    .p4{height:46px;background:#7bd389;}
    .p5{height:40px;background:#6ca0dc;}
    .p6{height:48px;background:#be7cff;}

    #road{
      position:absolute;
      left:22%;
      right:22%;
      top:0;
      bottom:0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.03), rgba(255,255,255,0)),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.03) 0px,
          rgba(255,255,255,.03) 36px,
          transparent 36px,
          transparent 72px
        ),
        linear-gradient(to bottom, var(--road1), var(--road2));
      clip-path:polygon(12% 0, 88% 0, 100% 100%, 0 100%);
      z-index:2;
    }

    .lane-guide{
      position:absolute;
      top:0;
      bottom:0;
      width:20%;
      border-left:1px solid rgba(255,255,255,.05);
      z-index:4;
      pointer-events:none;
    }

    /* UI */
    #ui{
      position:absolute;
      top:max(10px, env(safe-area-inset-top));
      left:10px;
      right:10px;
      z-index:40;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      pointer-events:none;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
    }

    .ui-box{
      background:var(--ui-bg);
      border-radius:18px;
      padding:12px 16px;
      min-width:150px;
      backdrop-filter:blur(4px);
    }

    .ui-title{
      font-size:16px;
      opacity:.92;
      margin-bottom:2px;
    }

    .ui-main{
      font-size:30px;
      line-height:1;
      font-weight:900;
    }

    #timeBarWrap{
      margin-top:8px;
      width:220px;
      height:18px;
      background:rgba(255,255,255,.16);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
    }

    #timeBar{
      width:100%;
      height:100%;
      transform-origin:left center;
      background:linear-gradient(to right,#45dd59,#ffdf4d,#ff5a4e);
    }

    #speedWrap{
      position:absolute;
      right:14px;
      bottom:126px;
      z-index:40;
      width:140px;
      pointer-events:none;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
    }

    #speedLabel{
      text-align:right;
      font-size:14px;
      margin-bottom:6px;
      opacity:.9;
    }

    #speedMeter{
      height:16px;
      background:rgba(255,255,255,.16);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
    }

    #speedFill{
      width:20%;
      height:100%;
      background:linear-gradient(to right,#39e04d,#ffe04f,#ff5d50);
      transition:width .12s linear;
    }

    #speedValue{
      margin-top:4px;
      text-align:right;
      font-size:24px;
      font-weight:bold;
    }

    /* プレイヤー */
    #player{
      position:absolute;
      left:41%;
      bottom:170px;
      width:18%;
      height:78px;
      border-radius:16px;
      background:rgba(57,224,77,.18);
      border:2px solid rgba(57,224,77,.75);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:30;
      transition:left .08s steps(1), transform .12s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.32);
    }

    #player.hit{
      transform:translateY(6px) rotate(-8deg);
      background:rgba(255,184,71,.18);
      border-color:rgba(255,184,71,.88);
    }

    .cart-body{
      font-size:44px;
      line-height:1;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.55));
    }

    /* 迫ってくるオブジェクト */
    .entity{
      position:absolute;
      left:0;
      top:0;
      width:60px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      z-index:12;
      pointer-events:none;
      box-shadow:0 8px 14px rgba(0,0,0,.24);
      backdrop-filter:blur(2px);
      transform:translate(-50%, -50%) scale(1);
    }

    .item{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.14);
    }

    .obstacle{
      background:rgba(255,110,110,.16);
      border:1px solid rgba(255,160,160,.24);
    }

    .danger{
      background:repeating-linear-gradient(
        -45deg,
        var(--danger2) 0px,
        var(--danger2) 14px,
        var(--danger) 14px,
        var(--danger) 28px
      );
      border:2px solid #111;
      color:#111;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      text-shadow:none;
    }

    /* メッセージ */
    #message{
      position:absolute;
      left:50%;
      top:40%;
      transform:translate(-50%, -50%);
      z-index:60;
      text-align:center;
      opacity:0;
      transition:opacity .15s ease;
      pointer-events:none;
      text-shadow:0 4px 8px rgba(0,0,0,.65);
    }

    #message.show{
      opacity:1;
    }

    #messageMain{
      font-size:clamp(28px,7vw,56px);
      font-weight:900;
      line-height:1;
    }

    #messageSub{
      margin-top:8px;
      font-size:clamp(18px,3vw,28px);
      font-weight:800;
    }

    #pickupText{
      position:absolute;
      left:50%;
      top:24%;
      transform:translateX(-50%);
      z-index:55;
      font-size:28px;
      font-weight:900;
      opacity:0;
      pointer-events:none;
      text-shadow:0 3px 6px rgba(0,0,0,.65);
    }

    #pickupText.show{
      animation:pickupPop .55s ease;
    }

    @keyframes pickupPop{
      0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.9);}
      18%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.06);}
      100%{opacity:0;transform:translateX(-50%) translateY(-18px) scale(1);}
    }

    /* ボタン */
    #controls{
      position:fixed;
      inset:0;
      z-index:9999;
      pointer-events:none;
    }

    .control-btn{
      position:fixed;
      bottom:max(84px, env(safe-area-inset-bottom, 12px));
      width:152px;
      height:98px;
      border:none;
      border-radius:22px;
      background:var(--btn-bg);
      color:#111;
      font-size:40px;
      font-weight:900;
      box-shadow:0 8px 18px rgba(0,0,0,.34);
      pointer-events:auto;
      touch-action:manipulation;
      will-change:transform;
    }

    .control-btn:active{
      transform:scale(.97);
      background:var(--btn-active);
    }

    #leftBtn{ left:24px; }
    #rightBtn{ right:24px; }

    /* リザルト */
    #resultOverlay{
      position:absolute;
      inset:0;
      z-index:200;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.82);
      padding:24px;
    }

    #resultCard{
      width:min(92vw,560px);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:24px;
      padding:24px;
      text-align:center;
      box-shadow:0 14px 26px rgba(0,0,0,.34);
    }

    #resultTitle{
      font-size:clamp(28px,6vw,44px);
      font-weight:900;
      margin-bottom:12px;
    }

    #resultScore{
      font-size:clamp(22px,4vw,34px);
      font-weight:900;
      margin-bottom:10px;
    }

    #resultRank{
      font-size:clamp(18px,3vw,28px);
      margin-bottom:16px;
    }

    #couponText{
      font-size:clamp(18px,3vw,26px);
      color:#ffe04f;
      font-weight:bold;
      margin-bottom:18px;
    }

    #retryBtn{
      border:none;
      border-radius:16px;
      background:#fff;
      color:#111;
      font-size:20px;
      font-weight:900;
      padding:14px 26px;
    }

    @media (max-width: 900px){
      .shelf{ width:20%; }
      #road{ left:20%; right:20%; }
      .control-btn{ width:138px; height:94px; }
      #player{ bottom:168px; }
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="scene">
      <div id="ceiling"></div>

      <div id="leftShelf" class="shelf">
        <div class="shelf-products">
          <div class="row"><div class="prod p1"></div><div class="prod p3"></div><div class="prod p2"></div><div class="prod p5"></div><div class="prod p4"></div></div>
          <div class="row"><div class="prod p6"></div><div class="prod p1"></div><div class="prod p3"></div><div class="prod p4"></div><div class="prod p2"></div></div>
          <div class="row"><div class="prod p2"></div><div class="prod p5"></div><div class="prod p1"></div><div class="prod p6"></div><div class="prod p3"></div></div>
          <div class="row"><div class="prod p4"></div><div class="prod p1"></div><div class="prod p5"></div><div class="prod p2"></div><div class="prod p3"></div></div>
          <div class="row"><div class="prod p6"></div><div class="prod p2"></div><div class="prod p4"></div><div class="prod p5"></div><div class="prod p1"></div></div>
        </div>
      </div>

      <div id="rightShelf" class="shelf">
        <div class="shelf-products">
          <div class="row"><div class="prod p4"></div><div class="prod p2"></div><div class="prod p1"></div><div class="prod p5"></div><div class="prod p3"></div></div>
          <div class="row"><div class="prod p1"></div><div class="prod p3"></div><div class="prod p5"></div><div class="prod p6"></div><div class="prod p2"></div></div>
          <div class="row"><div class="prod p3"></div><div class="prod p4"></div><div class="prod p2"></div><div class="prod p1"></div><div class="prod p6"></div></div>
          <div class="row"><div class="prod p2"></div><div class="prod p6"></div><div class="prod p1"></div><div class="prod p4"></div><div class="prod p5"></div></div>
          <div class="row"><div class="prod p5"></div><div class="prod p2"></div><div class="prod p4"></div><div class="prod p1"></div><div class="prod p3"></div></div>
        </div>
      </div>

      <div id="road"></div>
    </div>

    <div id="ui">
      <div class="ui-box">
        <div class="ui-title">SCORE</div>
        <div id="score" class="ui-main">0</div>
      </div>

      <div class="ui-box" style="text-align:right;">
        <div class="ui-title">TIME GAUGE</div>
        <div id="timeValue" class="ui-main">60</div>
        <div id="timeBarWrap">
          <div id="timeBar"></div>
        </div>
      </div>
    </div>

    <div id="speedWrap">
      <div id="speedLabel">SPEEDOMETER</div>
      <div id="speedMeter"><div id="speedFill"></div></div>
      <div id="speedValue">1</div>
    </div>

    <div id="field">
      <div class="lane-guide" style="left:0%;"></div>
      <div class="lane-guide" style="left:20%;"></div>
      <div class="lane-guide" style="left:40%;"></div>
      <div class="lane-guide" style="left:60%;"></div>
      <div class="lane-guide" style="left:80%;"></div>

      <div id="player">
        <span class="cart-body">🛒</span>
      </div>
    </div>

    <div id="pickupText"></div>

    <div id="message">
      <div id="messageMain"></div>
      <div id="messageSub"></div>
    </div>

    <div id="controls">
      <button id="leftBtn" class="control-btn" aria-label="左へ移動">←</button>
      <button id="rightBtn" class="control-btn" aria-label="右へ移動">→</button>
    </div>

    <div id="resultOverlay">
      <div id="resultCard">
        <div id="resultTitle">買い物終了ッ！！</div>
        <div id="resultScore">スコア: 0</div>
        <div id="resultRank">こどものおつかい</div>
        <div id="couponText">靴下・パンスト・レギンス 10%OFF</div>
        <button id="retryBtn">もう一回やる</button>
      </div>
    </div>
  </div>

  <script>
    const LANES = 5;
    const START_TIME = 60;
    const ROAD_TOP_Y = 18;
    const ROAD_BOTTOM_Y = 78;
    const PLAYER_HIT_LINE = 72; // 接触判定ライン
    const ROAD_LEFT_TOP = 32;
    const ROAD_RIGHT_TOP = 68;
    const ROAD_LEFT_BOTTOM = 22;
    const ROAD_RIGHT_BOTTOM = 78;

    const scoreEl = document.getElementById("score");
    const timeValueEl = document.getElementById("timeValue");
    const timeBarEl = document.getElementById("timeBar");
    const speedFillEl = document.getElementById("speedFill");
    const speedValueEl = document.getElementById("speedValue");
    const playerEl = document.getElementById("player");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const fieldEl = document.getElementById("field");
    const messageEl = document.getElementById("message");
    const messageMainEl = document.getElementById("messageMain");
    const messageSubEl = document.getElementById("messageSub");
    const pickupTextEl = document.getElementById("pickupText");
    const resultOverlayEl = document.getElementById("resultOverlay");
    const resultScoreEl = document.getElementById("resultScore");
    const resultRankEl = document.getElementById("resultRank");
    const retryBtn = document.getElementById("retryBtn");
    const leftShelfEl = document.getElementById("leftShelf");
    const rightShelfEl = document.getElementById("rightShelf");

    let lane = 2;
    let score = 0;
    let timeLeft = START_TIME;
    let speedLevel = 1;
    let running = true;
    let hitLock = false;
    let spawnTimer = null;
    let gameTimer = null;
    let animationFrame = null;
    const objects = new Set();

    const itemTable = [
      { emoji: "🥕", points: 1500, weight: 30, type: "item" },
      { emoji: "🐟", points: 2000, weight: 25, type: "item" },
      { emoji: "🥔", points: 3000, weight: 18, type: "item" },
      { emoji: "🍞", points: 4000, weight: 15, type: "item" },
      { emoji: "🥩", points: 5000, weight: 12, type: "item" }
    ];

    const obstacleTable = [
      { emoji: "📦", points: -50000, weight: 45, type: "obstacle" },
      { emoji: "🚧", points: -50000, weight: 35, type: "obstacle" },
      { emoji: "🧍", points: -100000, weight: 20, type: "obstacle" }
    ];

    function weightedPick(list) {
      const total = list.reduce((sum, item) => sum + item.weight, 0);
      let r = Math.random() * total;
      for (const item of list) {
        r -= item.weight;
        if (r <= 0) return item;
      }
      return list[list.length - 1];
    }

    function laneToWorldX(laneIndex, depth) {
      const left = ROAD_LEFT_TOP + (ROAD_LEFT_BOTTOM - ROAD_LEFT_TOP) * depth;
      const right = ROAD_RIGHT_TOP + (ROAD_RIGHT_BOTTOM - ROAD_RIGHT_TOP) * depth;
      const laneWidth = (right - left) / LANES;
      return left + laneWidth * (laneIndex + 0.5);
    }

    function setPlayerLane() {
      const x = laneToWorldX(lane, 1);
      playerEl.style.left = `calc(${x}% - 9%)`;
    }

    function updateUI() {
      scoreEl.textContent = score.toLocaleString();
      timeValueEl.textContent = Math.max(0, Math.ceil(timeLeft)).toString();
      timeBarEl.style.transform = `scaleX(${Math.max(0, timeLeft) / START_TIME})`;
      speedFillEl.style.width = `${Math.min(100, speedLevel * 10)}%`;
      speedValueEl.textContent = String(Math.round(speedLevel));
    }

    function updateShelfMotion() {
      const intensity = Math.min(12, speedLevel * 0.9);
      leftShelfEl.style.transform = `translateX(${-intensity}px)`;
      rightShelfEl.style.transform = `translateX(${intensity}px)`;
    }

    let msgTimeout = null;
    function showMessage(main, sub = "", duration = 700) {
      messageMainEl.textContent = main;
      messageSubEl.textContent = sub;
      messageEl.classList.add("show");
      clearTimeout(msgTimeout);
      msgTimeout = setTimeout(() => {
        messageEl.classList.remove("show");
      }, duration);
    }

    function showPickup(text, color = "#ffe35a") {
      pickupTextEl.textContent = text;
      pickupTextEl.style.color = color;
      pickupTextEl.classList.remove("show");
      void pickupTextEl.offsetWidth;
      pickupTextEl.classList.add("show");
    }

    function getRank(scoreValue) {
      if (scoreValue >= 50000) return "真・買い物上手の総大将";
      if (scoreValue >= 30000) return "無尽蔵の買い物マイスター";
      if (scoreValue >= 20000) return "時代を担う買い物上手";
      if (scoreValue >= 10000) return "神速カスタマー";
      if (scoreValue >= 5000) return "努力の天才";
      return "こどものおつかい";
    }

    function endGame() {
      if (!running) return;
      running = false;

      clearInterval(spawnTimer);
      clearInterval(gameTimer);

      showMessage("買い物終了ッ！！", "", 900);

      setTimeout(() => {
        resultScoreEl.textContent = `スコア: ${score.toLocaleString()}`;
        resultRankEl.textContent = getRank(score);
        resultOverlayEl.style.display = "flex";
      }, 500);
    }

    function spawnObject() {
      if (!running) return;

      const useDanger = speedLevel >= 8 && Math.random() < 0.10;
      let picked;
      let className;

      if (useDanger) {
        picked = { emoji: "DANGER", points: -500000, type: "danger" };
        className = "entity danger";
      } else if (Math.random() < 0.72) {
        picked = weightedPick(itemTable);
        className = "entity item";
      } else {
        picked = weightedPick(obstacleTable);
        className = "entity obstacle";
      }

      const laneIndex = Math.floor(Math.random() * LANES);
      const el = document.createElement("div");
      el.className = className;
      el.textContent = picked.emoji;
      fieldEl.appendChild(el);

      const obj = {
        el,
        lane: laneIndex,
        type: picked.type,
        points: picked.points,
        depth: 0,
        done: false
      };

      objects.add(obj);
      placeObject(obj);
    }

    function placeObject(obj) {
      const x = laneToWorldX(obj.lane, obj.depth);
      const y = ROAD_TOP_Y + (ROAD_BOTTOM_Y - ROAD_TOP_Y) * obj.depth;
      const scale = 0.45 + obj.depth * 1.4;
      const width = 60 * scale;
      const height = 44 * scale;

      obj.el.style.left = `${x}%`;
      obj.el.style.top = `${y}%`;
      obj.el.style.width = `${width}px`;
      obj.el.style.height = `${height}px`;
      obj.el.style.fontSize = `${18 + obj.depth * 26}px`;
      obj.el.style.transform = `translate(-50%, -50%) scale(${scale})`;
      obj.el.style.opacity = `${0.72 + obj.depth * 0.35}`;
    }

    function triggerHit(type, points) {
      if (hitLock) return;
      hitLock = true;
      playerEl.classList.add("hit");
      score += points;

      if (type === "danger") {
        showMessage("重大事故発生！", "バックヤード案件です", 1100);
      } else {
        showMessage("フロア事故発生！", "店長に呼ばれています", 900);
      }

      updateUI();

      setTimeout(() => {
        playerEl.classList.remove("hit");
        hitLock = false;
      }, type === "danger" ? 900 : 600);
    }

    function gameLoop() {
      if (!running) return;

      for (const obj of [...objects]) {
        const speedFactor = 0.010 + speedLevel * 0.0018;
        obj.depth += speedFactor;

        if (!obj.done && obj.depth >= 0.92) {
          obj.done = true;

          if (obj.lane === lane) {
            if (obj.type === "item") {
              score += obj.points;
              showPickup(`+${obj.points.toLocaleString()}`, "#ffe35a");
              updateUI();
            } else {
              triggerHit(obj.type, obj.points);
            }
          }

          obj.el.remove();
          objects.delete(obj);
          continue;
        }

        if (obj.depth > 1.05) {
          obj.el.remove();
          objects.delete(obj);
          continue;
        }

        placeObject(obj);
      }

      animationFrame = requestAnimationFrame(gameLoop);
    }

    function moveLeft() {
      if (!running) return;
      lane = Math.max(0, lane - 1);
      setPlayerLane();
    }

    function moveRight() {
      if (!running) return;
      lane = Math.min(LANES - 1, lane + 1);
      setPlayerLane();
    }

    function bindPress(button, handler) {
      const start = (e) => {
        e.preventDefault();
        handler();
      };
      button.addEventListener("pointerdown", start, { passive: false });
    }

    bindPress(leftBtn, moveLeft);
    bindPress(rightBtn, moveRight);

    window.addEventListener("keydown", (e) => {
      if (!running) return;
      if (e.key === "ArrowLeft") moveLeft();
      if (e.key === "ArrowRight") moveRight();
    });

    function startGame() {
      lane = 2;
      score = 0;
      timeLeft = START_TIME;
      speedLevel = 1;
      running = true;
      hitLock = false;
      resultOverlayEl.style.display = "none";

      for (const obj of objects) {
        obj.el.remove();
      }
      objects.clear();

      cancelAnimationFrame(animationFrame);
      clearInterval(spawnTimer);
      clearInterval(gameTimer);

      setPlayerLane();
      updateUI();
      updateShelfMotion();

      showMessage("スリルカート、開店ッ！！", "", 900);

      spawnTimer = setInterval(() => {
        spawnObject();
        if (speedLevel >= 6 && Math.random() < 0.22) spawnObject();
      }, 900);

      gameTimer = setInterval(() => {
        if (!running) return;

        timeLeft -= 1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          updateUI();
          endGame();
          return;
        }

        if (timeLeft % 12 === 0 && speedLevel < 10) {
          speedLevel += 1;
        }

        updateUI();
        updateShelfMotion();
      }, 1000);

      animationFrame = requestAnimationFrame(gameLoop);
    }

    retryBtn.addEventListener("click", startGame);

    setPlayerLane();
    updateUI();
    updateShelfMotion();
    startGame();
  </script>
</body>
</html>
