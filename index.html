<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スリルカート試作</title>
<style>
html,body{
  margin:0; padding:0; overflow:hidden; background:#000;
}
#game{
  position:relative;
  width:100vw; height:100vh;
  overflow:hidden;
}

/* ===== 背景レイヤー ===== */
.layer{
  position:absolute;
  width:100%; height:200%;
  background-repeat:repeat-y;
  background-position:0 0;
  image-rendering:pixelated;
}

/* 遠景（ほぼ止める） */
#bgFar{
  background:url('assets/bg_far.png') no-repeat center top;
  background-size:cover;
  z-index:1;
  filter:blur(1.5px) brightness(0.8);
}

/* 棚 */
#bgShelfL, #bgShelfR{
  width:30%;
  background-size:cover;
  z-index:2;
  opacity:0.95;
}
#bgShelfL{
  left:0;
  background:url('assets/bg_shelf_left.png') no-repeat left top;
}
#bgShelfR{
  right:0;
  background:url('assets/bg_shelf_right.png') no-repeat right top;
}

/* 床（主役） */
#bgFloor{
  background:url('assets/bg_floor.png') repeat-y center;
  background-size:cover;
  z-index:0;
}

/* ===== UI ===== */
#stick{
  position:absolute;
  left:20px; bottom:20px;
  width:120px;
  z-index:5;
}
#btn{
  position:absolute;
  right:20px; bottom:20px;
  width:100px;
  z-index:5;
}
</style>
</head>
<body>

<div id="game">
  <div id="bgFloor" class="layer"></div>
  <div id="bgFar" class="layer"></div>
  <div id="bgShelfL" class="layer"></div>
  <div id="bgShelfR" class="layer"></div>

  <img id="stick" src="assets/joystick.png">
  <img id="btn" src="assets/red_button.png">
</div>

<script>
let floorY = 0;
let shelfY = 0;
let farY = 0;

let speed = 2;
let accel = false;

/* ===== 加速ボタン ===== */
const btn = document.getElementById("btn");
btn.addEventListener("touchstart",()=>accel=true);
btn.addEventListener("touchend",()=>accel=false);
btn.addEventListener("mousedown",()=>accel=true);
btn.addEventListener("mouseup",()=>accel=false);

/* ===== ループ ===== */
function loop(){
  let boost = accel ? 6 : 0;

  floorY += speed + boost;
  shelfY += (speed + boost)*0.5;
  farY += (speed + boost)*0.1;

  document.getElementById("bgFloor").style.backgroundPosition = `0 ${floorY}px`;
  document.getElementById("bgShelfL").style.backgroundPosition = `0 ${shelfY}px`;
  document.getElementById("bgShelfR").style.backgroundPosition = `0 ${shelfY}px`;
  document.getElementById("bgFar").style.backgroundPosition = `0 ${farY}px`;

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
